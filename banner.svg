<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 260" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0118"/>
      <stop offset="100%" stop-color="#16082c"/>
    </linearGradient>
    <!-- Only used for the NAME text glow, not for the fairy -->
    <filter id="neon">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    /* ── Stars ── */
    @keyframes tw  { 0%,100%{opacity:.12} 50%{opacity:.95} }
    @keyframes tw2 { 0%,100%{opacity:.2}  50%{opacity:.75} }
    .s1{animation:tw  3.1s infinite ease-in-out}
    .s2{animation:tw  4.4s infinite ease-in-out 1.2s}
    .s3{animation:tw2 2.9s infinite ease-in-out 0.6s}
    .s4{animation:tw  5.2s infinite ease-in-out 2s}
    .s5{animation:tw2 3.7s infinite ease-in-out 2.5s}
    .s6{animation:tw  4.8s infinite ease-in-out 1s}

    /* ── Floating code ── */
    .snip{font-family:'Courier New',monospace;font-weight:700;fill-opacity:0;font-size:11px}
    @keyframes rise1{0%{transform:translate(55px,268px);fill-opacity:0}12%{fill-opacity:.4}85%{fill-opacity:.4}100%{transform:translate(70px,42px);fill-opacity:0}}
    @keyframes rise2{0%{transform:translate(170px,268px);fill-opacity:0}12%{fill-opacity:.45}85%{fill-opacity:.45}100%{transform:translate(150px,46px);fill-opacity:0}}
    @keyframes rise3{0%{transform:translate(310px,268px);fill-opacity:0}12%{fill-opacity:.35}85%{fill-opacity:.35}100%{transform:translate(325px,44px);fill-opacity:0}}
    @keyframes rise4{0%{transform:translate(460px,268px);fill-opacity:0}12%{fill-opacity:.42}85%{fill-opacity:.42}100%{transform:translate(445px,50px);fill-opacity:0}}
    @keyframes rise5{0%{transform:translate(600px,268px);fill-opacity:0}12%{fill-opacity:.4}85%{fill-opacity:.4}100%{transform:translate(615px,46px);fill-opacity:0}}
    .r1{animation:rise1 13s infinite linear}
    .r2{animation:rise2 11s infinite linear 2.5s}
    .r3{animation:rise3 14s infinite linear 5s}
    .r4{animation:rise4 12s infinite linear 1.5s}
    .r5{animation:rise5 15s infinite linear 3.5s}
    .r1b{animation:rise1 13s infinite linear 6.5s}
    .r2b{animation:rise2 11s infinite linear 8.5s}
    .r3b{animation:rise3 14s infinite linear 9.2s}

    /* ── Fairy flight path ── */
    @keyframes fly {
      0%   { transform: translate(55px,125px)  scaleX(1)  rotate(-6deg) }
      12%  { transform: translate(180px,92px)  scaleX(1)  rotate(2deg) }
      25%  { transform: translate(315px,122px) scaleX(1)  rotate(-4deg) }
      38%  { transform: translate(452px,86px)  scaleX(1)  rotate(4deg) }
      49%  { transform: translate(585px,106px) scaleX(1)  rotate(-2deg) }
      51%  { transform: translate(592px,106px) scaleX(-1) rotate(-2deg) }
      63%  { transform: translate(465px,135px) scaleX(-1) rotate(4deg) }
      75%  { transform: translate(332px,96px)  scaleX(-1) rotate(-6deg) }
      88%  { transform: translate(192px,126px) scaleX(-1) rotate(4deg) }
      99%  { transform: translate(62px,108px)  scaleX(-1) rotate(-2deg) }
      100% { transform: translate(55px,125px)  scaleX(1)  rotate(-6deg) }
    }
    .fairy { animation: fly 24s infinite ease-in-out }

    /* Bob up/down */
    @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
    .fbob { animation: bob 1.9s infinite ease-in-out }

    /* Wing flap — fast, back-and-forth scale and rotate */
    @keyframes wflapl { 0%,100%{transform:scale(1) rotate(0deg)} 50%{transform:scale(.2, .85) rotate(-10deg)} }
    @keyframes wflapr { 0%,100%{transform:scale(1) rotate(0deg)} 50%{transform:scale(.2, .85) rotate(10deg)} }
    .wl { animation:wflapl .15s infinite ease-in-out; transform-origin:right center; transform-box: fill-box; }
    .wr { animation:wflapr .15s infinite ease-in-out .075s; transform-origin:left center; transform-box: fill-box; }

    /* ── Dust particles — inside fairy group, NO blur filter ──
       They start near the fairy's feet (y≈10) and drift
       backward in the fairy's LOCAL space (negative x = behind).
       Because the fairy group uses scaleX(-1) when turning left,
       the negative x automatically becomes "behind" in both directions. */

    @keyframes dp0{0%{transform:translate(0,10px);opacity:.9}100%{transform:translate(-30px,22px);opacity:0}}
    @keyframes dp1{0%{transform:translate(2px,12px);opacity:.8}100%{transform:translate(-24px,26px);opacity:0}}
    @keyframes dp2{0%{transform:translate(-1px,9px);opacity:.95}100%{transform:translate(-38px,18px);opacity:0}}
    @keyframes dp3{0%{transform:translate(3px,11px);opacity:.85}100%{transform:translate(-20px,28px);opacity:0}}
    @keyframes dp4{0%{transform:translate(0,13px);opacity:.9}100%{transform:translate(-44px,16px);opacity:0}}
    @keyframes dp5{0%{transform:translate(-2px,10px);opacity:.75}100%{transform:translate(-32px,24px);opacity:0}}
    @keyframes dp6{0%{transform:translate(1px,12px);opacity:.88}100%{transform:translate(-28px,20px);opacity:0}}
    @keyframes dp7{0%{transform:translate(-3px,11px);opacity:.82}100%{transform:translate(-40px,22px);opacity:0}}
    @keyframes dp8{0%{transform:translate(2px,9px);opacity:.92}100%{transform:translate(-22px,30px);opacity:0}}
    @keyframes dp9{0%{transform:translate(0,14px);opacity:.78}100%{transform:translate(-36px,18px);opacity:0}}

    /* Stagger 10 particles evenly across the 1.5s cycle */
    .dp0{fill:#e9d5ff;r:2;animation:dp0 1.5s infinite ease-out;animation-delay:0s}
    .dp1{fill:#7dd3fc;r:1.5;animation:dp1 1.5s infinite ease-out;animation-delay:.15s}
    .dp2{fill:#c4b5fd;r:2.2;animation:dp2 1.5s infinite ease-out;animation-delay:.30s}
    .dp3{fill:#a855f7;r:1.8;animation:dp3 1.5s infinite ease-out;animation-delay:.45s}
    .dp4{fill:#e9d5ff;r:1.2;animation:dp4 1.5s infinite ease-out;animation-delay:.60s}
    .dp5{fill:#7dd3fc;r:2.4;animation:dp5 1.5s infinite ease-out;animation-delay:.75s}
    .dp6{fill:#c4b5fd;r:1.6;animation:dp6 1.5s infinite ease-out;animation-delay:.90s}
    .dp7{fill:#a855f7;r:2;animation:dp7 1.5s infinite ease-out;animation-delay:1.05s}
    .dp8{fill:#e9d5ff;r:1.4;animation:dp8 1.5s infinite ease-out;animation-delay:1.20s}
    .dp9{fill:#7dd3fc;r:1.8;animation:dp9 1.5s infinite ease-out;animation-delay:1.35s}

    /* White sparkles mixed in */
    @keyframes ws{0%,100%{opacity:0;r:.4}40%{opacity:1;r:1.5}}
    .ws0{fill:#fff;animation:ws 1.5s infinite ease-out;animation-delay:.07s}
    .ws1{fill:#fff;animation:ws 1.5s infinite ease-out;animation-delay:.37s}
    .ws2{fill:#fff;animation:ws 1.5s infinite ease-out;animation-delay:.67s}
    .ws3{fill:#fff;animation:ws 1.5s infinite ease-out;animation-delay:.97s}
    .ws4{fill:#fff;animation:ws 1.5s infinite ease-out;animation-delay:1.27s}
  </style>

  <!-- Background -->
  <rect width="680" height="260" rx="12" fill="url(#bgGrad)"/>

  <!-- Mac-style window bar -->
  <path d="M0 12 A12 12 0 0 1 12 0 L668 0 A12 12 0 0 1 680 12 L680 38 L0 38 Z" fill="#161b22"/>
  <line x1="0" y1="38" x2="680" y2="38" stroke="#30363d" stroke-width="1"/>
  <circle cx="20" cy="19" r="5" fill="#ff5f57"/>
  <circle cx="36" cy="19" r="5" fill="#febc2e"/>
  <circle cx="52" cy="19" r="5" fill="#28c840"/>
  <rect x="130" y="8" width="420" height="22" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="340" y="23" text-anchor="middle"
        font-family="Consolas,Monaco,monospace" font-size="11" fill="#8b949e">
    github.com/ValenColm/ValenColm
  </text>

  <!-- Stars -->
  <circle cx="42"  cy="64"  r="1" fill="#d8b4fe" class="s1"/>
  <circle cx="90"  cy="82"  r="1" fill="#7dd3fc" class="s2"/>
  <circle cx="118" cy="52"  r="1" fill="#d8b4fe" class="s3"/>
  <circle cx="178" cy="74"  r="1" fill="#7dd3fc" class="s4"/>
  <circle cx="235" cy="58"  r="1" fill="#d8b4fe" class="s5"/>
  <circle cx="295" cy="78"  r="1" fill="#7dd3fc" class="s6"/>
  <circle cx="345" cy="48"  r="1" fill="#d8b4fe" class="s1"/>
  <circle cx="415" cy="68"  r="1" fill="#7dd3fc" class="s3"/>
  <circle cx="462" cy="54"  r="1" fill="#d8b4fe" class="s2"/>
  <circle cx="525" cy="82"  r="1" fill="#7dd3fc" class="s5"/>
  <circle cx="575" cy="62"  r="1" fill="#d8b4fe" class="s4"/>
  <circle cx="635" cy="72"  r="1" fill="#7dd3fc" class="s6"/>
  <circle cx="32"  cy="185" r="1" fill="#d8b4fe" class="s3"/>
  <circle cx="98"  cy="222" r="1" fill="#7dd3fc" class="s1"/>
  <circle cx="158" cy="192" r="1" fill="#d8b4fe" class="s5"/>
  <circle cx="218" cy="235" r="1" fill="#7dd3fc" class="s2"/>
  <circle cx="278" cy="175" r="1" fill="#d8b4fe" class="s6"/>
  <circle cx="318" cy="218" r="1" fill="#7dd3fc" class="s4"/>
  <circle cx="378" cy="188" r="1" fill="#d8b4fe" class="s1"/>
  <circle cx="438" cy="238" r="1" fill="#7dd3fc" class="s3"/>
  <circle cx="498" cy="198" r="1" fill="#d8b4fe" class="s5"/>
  <circle cx="558" cy="228" r="1" fill="#7dd3fc" class="s2"/>
  <circle cx="618" cy="182" r="1" fill="#d8b4fe" class="s4"/>
  <circle cx="652" cy="218" r="1" fill="#7dd3fc" class="s6"/>

  <!-- Floating code snippets -->
  <text class="snip r1" fill="#a855f7">{}</text>
  <text class="snip r2" fill="#0ea5e9">&lt;/&gt;</text>
  <text class="snip r3" fill="#ec4899">()=&gt;</text>
  <text class="snip r4" fill="#a855f7">AI</text>
  <text class="snip r5" fill="#0ea5e9">RAG</text>
  <text class="snip r1b" fill="#ec4899">def</text>
  <text class="snip r2b" fill="#a855f7">API</text>
  <text class="snip r3b" fill="#0ea5e9">LLM</text>

  <!-- Title text (neon glow only on text) -->
  <text x="340" y="188" text-anchor="middle"
        font-family="Georgia,serif" font-size="27" font-weight="700"
        fill="#a855f7" filter="url(#neon)" opacity="0.5">Valentina Bolivar</text>
  <text x="340" y="188" text-anchor="middle"
        font-family="Georgia,serif" font-size="27" font-weight="700"
        fill="#e8d5ff" letter-spacing="1">Valentina Bolivar</text>
  <text x="340" y="214" text-anchor="middle"
        font-family="Courier New,monospace" font-size="11" font-weight="700"
        fill="#7dd3fc" letter-spacing="4">SOFTWARE DEVELOPER</text>
  <text x="340" y="234" text-anchor="middle"
        font-family="Courier New,monospace" font-size="9"
        fill="#a78bfa" letter-spacing="2">AI · AUTOMATION · BACKEND</text>

  <!-- ===================== FAIRY ===================== -->
  <g class="fairy">
    <g class="fbob">

      <!-- DUST — no blur filter, just crisp small dots -->
      <circle class="dp0"/><circle class="dp1"/>
      <circle class="dp2"/><circle class="dp3"/>
      <circle class="dp4"/><circle class="dp5"/>
      <circle class="dp6"/><circle class="dp7"/>
      <circle class="dp8"/><circle class="dp9"/>
      <circle class="ws0"/><circle class="ws1"/>
      <circle class="ws2"/><circle class="ws3"/>
      <circle class="ws4"/>

      <!-- LEFT WING (drawn first so body is on top) -->
      <g class="wl">
        <!-- Big outer wing -->
        <path d="M-1,-5 C-10,-22 -34,-15 -26,0 C-18,12 -4,8 -1,-5Z"
              fill="#c4b5fd" opacity="0.52"/>
        <!-- Small inner lobe -->
        <path d="M-1,-4 C-6,-14 -20,-9 -16,0 C-10,8 -2,5 -1,-4Z"
              fill="#e9d5ff" opacity="0.70"/>
      </g>

      <!-- RIGHT WING -->
      <g class="wr">
        <!-- Big outer wing -->
        <path d="M1,-5 C10,-22 34,-15 26,0 C18,12 4,8 1,-5Z"
              fill="#a5b4fc" opacity="0.42"/>
        <!-- Small inner lobe -->
        <path d="M1,-4 C6,-14 20,-9 16,0 C10,8 2,5 1,-4Z"
              fill="#bfdbfe" opacity="0.62"/>
      </g>

      <!-- BODY (dress) -->
      <ellipse cx="0" cy="4"  rx="4"   ry="6"   fill="#1e3a5f"/>
      <ellipse cx="0" cy="4"  rx="3"   ry="4.5" fill="#2563eb"/>
      <!-- Dress shimmer -->
      <ellipse cx="0" cy="1"  rx="2"   ry="1.4" fill="#60a5fa" opacity="0.45"/>

      <!-- HEAD -->
      <circle cx="0" cy="-9" r="4.5" fill="#fcd5b0"/>
      <!-- Hair bun -->
      <circle cx="0" cy="-14" r="2"    fill="#d4a847"/>
      <path d="M-4.5,-10 C-4.3,-13 4.3,-13 4.5,-10Z" fill="#d4a847"/>
      <!-- Tiny face details -->
      <circle cx="-1.5" cy="-9.5" r=".6" fill="#5a3825" opacity="0.7"/>
      <circle cx="1.5"  cy="-9.5" r=".6" fill="#5a3825" opacity="0.7"/>

      <!-- LEGS -->
      <line x1="-2" y1="5"  x2="-3.5" y2="13" stroke="#fcd5b0" stroke-width="1.3" stroke-linecap="round"/>
      <line x1="2"  y1="5"  x2="3.5"  y2="13" stroke="#fcd5b0" stroke-width="1.3" stroke-linecap="round"/>
      <circle cx="-3.5" cy="13" r="1.2" fill="#fcd5b0"/>
      <circle cx="3.5"  cy="13" r="1.2" fill="#fcd5b0"/>

      <!-- LEFT ARM + LAPTOP -->
      <line x1="-2" y1="-1" x2="-7" y2="3" stroke="#fcd5b0" stroke-width="1.2" stroke-linecap="round"/>
      <g transform="translate(-8,3.5) rotate(-12)">
        <rect x="-3.5" y="-3.5" width="7" height="5.5" rx="1" fill="#1e293b" stroke="#38bdf8" stroke-width="0.6"/>
        <text x="-2" y="0.5" font-family="monospace" font-size="3.5" fill="#38bdf8" font-weight="bold">&gt;_</text>
        <line x1="-3.5" y1="2.2" x2="3.5" y2="2.2" stroke="#334155" stroke-width="0.7"/>
      </g>

      <!-- RIGHT ARM -->
      <line x1="2" y1="-1" x2="7" y2="4" stroke="#fcd5b0" stroke-width="1.2" stroke-linecap="round"/>

    </g>
  </g>
</svg>
